<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --glass:rgba(20,25,45,0.6);
  --border:rgba(255,255,255,0.08);
  --green:#00ff99;
  --purple:#a855f7;
  --red:#ff3b5c;
  --blue:#4cc9ff;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#101530 0%,#05060a 60%);
  color:white;
  overflow-x:hidden;
}

/* ================= LOADER ================= */

#loader{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  overflow:hidden;
  transition:opacity .8s ease;
}

/* Animated Background */
#loader::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,#05060a,#0c1025,#101530,#0c1025,#05060a);
  background-size:300% 300%;
  animation:bgMove 8s ease infinite;
  z-index:-1;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Blue Gradient Floating Text */
.loader-title{
  font-size:42px;
  font-weight:800;
  margin-bottom:40px;
  background:linear-gradient(
    90deg,
    #4cc9ff,
    #3a86ff,
    #1d4ed8,
    #3a86ff,
    #4cc9ff
  );
  background-size:200% auto;
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  animation:
    gradientMove 3s linear infinite,
    floatText 4s ease-in-out infinite;
}

@keyframes gradientMove{
  0%{background-position:0% center;}
  100%{background-position:200% center;}
}

@keyframes floatText{
  0%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
  100%{transform:translateY(0)}
}

/* Loader Bar */
.loader-bar-wrapper{
  width:320px;
  height:22px;
  background:rgba(255,255,255,0.1);
  border-radius:50px;
  overflow:hidden;
}

.loader-bar{
  height:100%;
  width:0%;
  border-radius:50px;
  background:linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8,#4cc9ff);
  background-size:200% 100%;
  box-shadow:0 0 25px rgba(76,201,255,.9);
  animation:loadBar 4s linear forwards, moveGradientBar 2s linear infinite;
}

@keyframes loadBar{
  from{width:0%}
  to{width:100%}
}

@keyframes moveGradientBar{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* ================= MAIN CONTENT ================= */

.container{
  max-width:850px;
  margin:auto;
  padding:40px 20px;
  opacity:0;
  transition:opacity .8s ease;
}

/* Header */

.header{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:25px;
  padding:25px;
  margin-bottom:40px;
}

/* Ripple Status Dot */

.status-wrapper{
  position:relative;
  width:22px;
  height:22px;
}

.status-dot{
  width:100%;
  height:100%;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#66ffcc,var(--green));
  box-shadow:0 0 20px var(--green);
  position:absolute;
}

.ring{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:2px solid var(--green);
  opacity:0;
  animation:ripple 3s infinite;
}

.ring:nth-child(3){animation-delay:1.2s}

@keyframes ripple{
  0%{transform:scale(1);opacity:.6}
  100%{transform:scale(2.4);opacity:0}
}

.header-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

h1{
  font-size:24px;
  font-weight:800;
}

/* Cards */

.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:30px;
  padding:30px;
  margin-bottom:35px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.service-title{
  font-size:22px;
  font-weight:700;
}

.badge{
  padding:8px 20px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
}

.operational{color:var(--green);border:2px solid var(--green)}
.maintenance{color:var(--purple);border:2px solid var(--purple)}
.down{color:var(--red);border:2px solid var(--red)}
.development{color:var(--blue);border:2px solid var(--blue)}

.progress-wrapper{
  background:rgba(255,255,255,0.08);
  border-radius:30px;
  height:22px;
  overflow:hidden;
}

.progress-bar{
  position:relative;
  height:100%;
  border-radius:30px;
  background:linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8);
  width:0;
  transition:width 1.5s ease;
  overflow:hidden;
}

.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:40%;
  height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
  transform:skewX(-20deg);
  animation:slideShine 3s infinite;
}

@keyframes slideShine{
  0%{left:-100%}
  100%{left:120%}
}

.percent{
  margin-top:10px;
  font-weight:600;
}

.footer{
  text-align:center;
  margin-top:50px;
  opacity:.6;
}
</style>
</head>

<body>

<div id="loader">
  <div class="loader-title">Status Loading...</div>
  <div class="loader-bar-wrapper">
    <div class="loader-bar"></div>
  </div>
</div>

<div class="container" id="mainContent">

<div class="header">
  <div class="header-top">
    <div class="status-wrapper">
      <div class="status-dot"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <h1>Shoot a Brain Rot Status</h1>
  </div>
</div>

<div id="services"></div>

<div class="footer">Made by Tazz & Jme</div>

</div>

<script>

/* Fade loader */
setTimeout(()=>{
  document.getElementById("loader").style.opacity="0";
  document.getElementById("mainContent").style.opacity="1";
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },800);
},4000);

/* Services */
const services=[
{name:"Discord Bot",percent:100,status:"operational"},
{name:"Website",percent:0,status:"maintenance"},
{name:"Progress",percent:10,status:"development"},
{name:"API",percent:5,status:"down"}
];

function render(){
  const container=document.getElementById("services");
  services.forEach(service=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="row">
        <div class="service-title">${service.name}</div>
        <div class="badge ${service.status}">${service.status.toUpperCase()}</div>
      </div>
      <div class="progress-wrapper">
        <div class="progress-bar"></div>
      </div>
      <div class="percent">0%</div>
    `;
    container.appendChild(card);

    const bar=card.querySelector(".progress-bar");
    const percentText=card.querySelector(".percent");

    setTimeout(()=>{bar.style.width=service.percent+"%"},200);

    let count=0;
    let interval=setInterval(()=>{
      if(count>=service.percent){clearInterval(interval)}
      else{count++;percentText.textContent=count+"%"}
    },15);
  });
}
render();

</script>
</body>
</html>
