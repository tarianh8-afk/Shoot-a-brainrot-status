<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --glass:rgba(20,25,45,0.55);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --green:#00ff99;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#101530 0%,#05060a 60%);
  color:var(--text);
  padding:40px 20px;
}

/* FLOAT HEADER */
@keyframes floatHeader {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}

.header{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:25px;
  padding:30px;
  max-width:800px;
  margin:auto;
  animation: floatHeader 5s ease-in-out infinite;
  position:relative;
}

/* WATER DROP STATUS DOT */
.status-dot{
  width:20px;
  height:20px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #66ffcc, var(--green));
  position:relative;
  box-shadow:0 0 25px var(--green);
  overflow:hidden;
  animation: pulseGlow 3s ease-in-out infinite;
}

/* Shine reflection */
.status-dot::before{
  content:"";
  position:absolute;
  top:2px;
  left:3px;
  width:8px;
  height:8px;
  background:rgba(255,255,255,0.8);
  border-radius:50%;
  filter:blur(1px);
  animation: shineMove 3s ease-in-out infinite;
}

/* Ripple effect */
.status-dot::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid rgba(0,255,153,0.5);
  animation:ripple 2.5s infinite;
}

@keyframes ripple{
  0%{
    transform:scale(1);
    opacity:0.8;
  }
  100%{
    transform:scale(2.2);
    opacity:0;
  }
}

@keyframes pulseGlow{
  0%{ box-shadow:0 0 20px var(--green); }
  50%{ box-shadow:0 0 40px var(--green); }
  100%{ box-shadow:0 0 20px var(--green); }
}

@keyframes shineMove{
  0%{ transform:translate(0,0); opacity:0.9;}
  50%{ transform:translate(2px,2px); opacity:0.6;}
  100%{ transform:translate(0,0); opacity:0.9;}
}

.header-top{
  display:flex;
  align-items:center;
  gap:15px;
}

h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

.button-group{
  margin-top:20px;
  display:flex;
  gap:15px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:50px;
  text-align:center;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 20px rgba(255,255,255,0.6);
  transform:translateY(-2px);
}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="status-dot"></div>
    <h1>System Operational</h1>
  </div>

  <div class="button-group">
    <button class="btn">Toggle Mode</button>
    <a href="#" class="btn">Email</a>
  </div>
</div>

</body>
</html>
