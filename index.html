<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:#070b14;
  color:white;
  overflow-x:hidden;
}

/* PARTICLE CANVAS */
#particles{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  max-width:750px;
  margin:80px auto;
  padding:20px;
}

/* HEADER */
.header{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  padding:25px;
  border-radius:16px;
  margin-bottom:25px;
  text-align:center;
  box-shadow:0 0 40px rgba(0,140,255,.2);
}

/* CARD */
.card{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(15px);
  padding:18px;
  border-radius:16px;
  margin-bottom:18px;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:12px;
}

/* WATER RIPPLE STATUS DOT */
.status-dot{
  position:relative;
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff88;
  box-shadow:0 0 12px #00ff88;
  display:inline-block;
  margin-right:8px;
}

/* Ripple Layer 1 */
.status-dot::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid #00ff88;
  animation:ripple 2.2s infinite;
  opacity:.7;
}

/* Ripple Layer 2 */
.status-dot::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid #00ff88;
  animation:ripple 2.2s infinite;
  animation-delay:1.1s;
  opacity:.5;
}

@keyframes ripple{
  0%{
    transform:scale(1);
    opacity:.7;
  }
  100%{
    transform:scale(3.5);
    opacity:0;
  }
}

/* BADGE */
.badge{
  font-size:12px;
  padding:5px 10px;
  border-radius:8px;
  background:rgba(255,255,255,.08);
}

/* PROGRESS BAR */
.progress-wrapper{
  width:100%;
  height:12px;
  background:rgba(255,255,255,.08);
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:20px;
  background:linear-gradient(90deg,#00c6ff,#0044ff);
  box-shadow:
    0 0 20px rgba(0,140,255,.9),
    0 0 35px rgba(0,80,255,.6);
  position:relative;
  transition:width 1.5s ease;
}

/* SHINE EFFECT (STAYS INSIDE BAR) */
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-40%;
  width:40%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.6),
    transparent
  );
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{left:-40%;}
  100%{left:120%;}
}

.percent{
  text-align:right;
  margin-top:6px;
  font-size:13px;
  opacity:.8;
}

</style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="header">
  <h1>System Status</h1>
</div>

<div id="services"></div>

</div>

<script>

/* ORIGINAL SERVICES */
const services=[
{name:"Discord Bot",percent:100,status:"Operational"},
{name:"Website",percent:75,status:"Operational"},
{name:"Development",percent:40,status:"In Progress"},
{name:"API",percent:15,status:"Testing"}
];

function render(){
const container=document.getElementById("services");
container.innerHTML="";

services.forEach(service=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="row">
<div><span class="status-dot"></span>${service.name}</div>
<div class="badge">${service.status}</div>
</div>
<div class="progress-wrapper">
<div class="progress-bar"></div>
</div>
<div class="percent">0%</div>
`;

container.appendChild(card);

const bar=card.querySelector(".progress-bar");
const percentText=card.querySelector(".percent");

setTimeout(()=>{
bar.style.width=service.percent+"%";
},300);

/* COUNTER */
let count=0;
let interval=setInterval(()=>{
if(count>=service.percent){
clearInterval(interval);
}else{
count++;
percentText.textContent=count+"%";
}
},15);
});
}

render();

/* ANIMATED PARTICLES BACKGROUND */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(0,170,255,.7)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});
requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
