<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --green:#00ff99;
  --purple:#a855f7;
  --red:#ff3b5c;
  --blue:#4cc9ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  color:#fff;
  padding:30px 18px;
  background:linear-gradient(-45deg,#05060a,#0f1325,#101530,#0a0c18);
  background-size:400% 400%;
  animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{
  max-width:900px;
  margin:auto;
}

/* HEADER */

@keyframes floatHeader{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.header{
  background:rgba(20,25,45,0.55);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:30px;
  margin-bottom:50px;
  animation:floatHeader 6s ease-in-out infinite;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 40px rgba(76,201,255,0.15);
}

/* STATUS DOT */

.status-wrapper{
  position:relative;
  width:24px;
  height:24px;
}

@keyframes blob{
  0%,100%{border-radius:50%}
  25%{border-radius:55% 45% 60% 40%/50% 60% 40% 50%}
  50%{border-radius:45% 55% 40% 60%/60% 40% 60% 40%}
  75%{border-radius:60% 40% 55% 45%/45% 55% 45% 55%}
}

.status-dot{
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 30%, #66ffcc, var(--green));
  position:absolute;
  animation:blob 6s infinite ease-in-out;
  box-shadow:0 0 40px var(--green);
}

.status-dot::after{
  content:"";
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid var(--green);
  animation:ripple 3s infinite;
}

@keyframes ripple{
  0%{transform:scale(1);opacity:0.6}
  100%{transform:scale(2.5);opacity:0}
}

/* HEADER LAYOUT */

.header-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:25px;
}

h1{margin:0;font-size:26px}

.button-group{
  display:flex;
  gap:15px;
}

.btn{
  flex:1;
  padding:14px;
  border-radius:50px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 25px rgba(255,255,255,.4);
}

/* CARDS */

.card{
  background:rgba(20,25,45,0.55);
  backdrop-filter:blur(20px);
  border-radius:30px;
  padding:30px;
  margin-bottom:40px;
  border:1px solid rgba(255,255,255,0.08);
  transition:.4s;
}

.card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.service-title{
  font-size:22px;
  font-weight:700;
}

.badge{
  padding:8px 20px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
}

.operational{color:var(--green);border:2px solid var(--green);box-shadow:0 0 15px var(--green)}
.maintenance{color:var(--purple);border:2px solid var(--purple);box-shadow:0 0 15px var(--purple)}
.down{color:var(--red);border:2px solid var(--red);box-shadow:0 0 15px var(--red)}
.development{color:var(--blue);border:2px solid var(--blue);box-shadow:0 0 15px var(--blue)}

/* PROGRESS */

.progress-wrapper{
  background:rgba(255,255,255,0.08);
  border-radius:30px;
  height:24px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  border-radius:30px;
  background:linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8);
  box-shadow:0 0 25px rgba(76,201,255,.7);
  position:relative;
  width:0;
}

/* Shine */
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  height:100%;
  width:60%;
  background:linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,.2) 30%,
    rgba(255,255,255,.6) 50%,
    rgba(255,255,255,.2) 70%,
    transparent 100%
  );
  transform:skewX(-20deg);
  animation:shine 4s infinite;
}

@keyframes shine{
  0%{left:-120%}
  100%{left:150%}
}

.percent{
  margin-top:12px;
  font-weight:600;
}

/* TEAM */

.team-grid{
  display:grid;
  gap:14px;
}

.team-role{
  padding:16px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  transition:.3s;
}

.team-role:hover{
  box-shadow:0 0 20px var(--blue);
  transform:translateY(-3px);
}

.footer{
  text-align:center;
  margin-top:60px;
  opacity:.6;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="header-top">
    <div class="status-wrapper">
      <div class="status-dot"></div>
    </div>
    <h1>Shoot a Brain Rot Status</h1>
  </div>

  <div class="button-group">
    <button class="btn">Toggle Mode</button>
    <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
  </div>
</div>

<div id="services"></div>

<div class="card">
  <div class="row">
    <div class="service-title">Our Team</div>
    <div class="badge development">CORE</div>
  </div>

  <div class="team-grid">
    <div class="team-role"><strong>Owner:</strong> Tazz</div>
    <div class="team-role"><strong>Co Owner:</strong> Jme</div>
    <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
    <div class="team-role"><strong>Administrations:</strong> Joe</div>
  </div>
</div>

<div class="footer">
Made by Tazz & Jme
</div>

</div>

<script>
const services=[
  {name:"Discord Bot",percent:100,status:"operational"},
  {name:"Website",percent:0,status:"maintenance"},
  {name:"Progress",percent:10,status:"development"},
  {name:"API",percent:5,status:"down"}
];

function render(){
  const container=document.getElementById("services");

  services.forEach(service=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="row">
        <div class="service-title">${service.name}</div>
        <div class="badge ${service.status}">
          ${service.status.toUpperCase()}
        </div>
      </div>
      <div class="progress-wrapper">
        <div class="progress-bar" data-width="${service.percent}%"></div>
      </div>
      <div class="percent">${service.percent}%</div>
    `;

    container.appendChild(card);
  });

  setTimeout(()=>{
    document.querySelectorAll(".progress-bar").forEach(bar=>{
      bar.style.width=bar.dataset.width;
    });
  },300);
}

render();
</script>

</body>
</html>
