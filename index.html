<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f1222;
    --bg2:#1b1f3a;
    --glass:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --accent:#a855f7;
}

.light{
    --bg1:#eef1ff;
    --bg2:#f8f9ff;
    --glass:rgba(255,255,255,0.7);
    --border:rgba(0,0,0,0.08);
    --text:#111827;
    --accent:#9333ea;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);
    padding:60px 20px;
    transition:0.3s ease;
}

.container{
    max-width:800px;
    margin:auto;
}

.header{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    padding:30px 40px;
    border-radius:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:40px;
    gap:15px;
    flex-wrap:wrap;
}

h1{
    font-size:24px;
    margin:0;
}

.toggle, .email-btn{
    padding:10px 22px;
    border-radius:50px;
    border:none;
    background:var(--accent);
    color:white;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    display:inline-block;
}

.card{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    margin-bottom:40px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.status{
    font-size:14px;
    font-weight:600;
    opacity:0.8;
}

.progress-wrapper{
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    height:18px;
    margin-top:10px;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,var(--accent),#d8b4fe);
    border-radius:20px;
}

.percent{
    margin-top:10px;
    font-size:13px;
    opacity:0.8;
}

.team-list{
    margin-top:20px;
    line-height:1.8;
    font-weight:500;
}

.footer{
    text-align:center;
    margin-top:60px;
    opacity:0.6;
}

@media(max-width:600px){
    body{padding:40px 15px}
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🧠 Shoot a Brain Rot Status</h1>
        <div>
            <button class="toggle" onclick="toggleMode()">Toggle Mode</button>
            <a class="email-btn" href="mailto:Tarianh8@outlook.com">Email Us</a>
        </div>
    </div>

    <div id="services"></div>

    <!-- TEAM SECTION -->
    <div class="card">
        <div class="row">
            <h2>Our Team</h2>
            <div class="status">Project Staff</div>
        </div>

        <div class="team-list">
            <strong>Owner:</strong> Tazz <br>
            <strong>Co Owner:</strong> Jme <br>
            <strong>Mods:</strong> Batman, Kyle <br>
            <strong>Administrations:</strong> idk (Joe) <br><br>
            <em>More soon...</em>
        </div>
    </div>

    <div class="footer">
        Made by <strong>tazz</strong> & Co-Owner <strong>Jme</strong>
    </div>

</div>

<script>
let services = [
    {name:"Discord Bot", progress:40},
    {name:"Website", progress:65},
    {name:"API", progress:20}
];

function render(){
    const container = document.getElementById("services");
    container.innerHTML="";

    services.forEach((service)=>{
        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="row">
                <h2>${service.name}</h2>
                <div class="status">Maintenance Progress</div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar" style="width:${service.progress}%"></div>
            </div>

            <div class="percent">${service.progress}% Complete</div>
        `;

        container.appendChild(card);
    });
}

function toggleMode(){
    document.body.classList.toggle("light");
    localStorage.setItem("mode",
        document.body.classList.contains("light")?"light":"dark");
}

if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}

render();
</script>

</body>
</html>
