<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --glass:rgba(20,25,45,0.55);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --green:#00ff99;
  --purple:#a855f7;
  --red:#ff3b5c;
  --blue:#4cc9ff;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#101530 0%,#05060a 60%);
  color:var(--text);
  padding:30px 18px;
  transition:.4s ease;
  overflow-x:hidden;
}

body.light{
  background:#f5f7ff;
  color:#111;
}

/* ================= LOADER ================= */

#loader{
  position:fixed;
  inset:0;
  background:#05060a;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  transition:opacity 1s ease;
}

.loader-title{
  font-size:28px;
  font-weight:800;
  margin-bottom:30px;
  letter-spacing:1px;
}

.loader-bar-wrapper{
  width:320px;
  height:22px;
  background:rgba(255,255,255,0.1);
  border-radius:50px;
  overflow:hidden;
}

.loader-bar{
  height:100%;
  width:0%;
  border-radius:50px;
  background:linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8);
  box-shadow:0 0 25px rgba(76,201,255,.8);
  animation:loadBar 10s linear forwards;
}

@keyframes loadBar{
  from{width:0%}
  to{width:100%}
}

/* ================= PARTICLES ================= */

#particles{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* ================= LAYOUT ================= */

.container{
  max-width:850px;
  margin:auto;
  opacity:0;
  transition:opacity 1s ease;
}

/* Floating header */

@keyframes floatHeader{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

.header{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:25px;
  padding:25px;
  margin-bottom:40px;
  animation:floatHeader 5s ease-in-out infinite;
}

/* Status Dot Ripple */

.status-wrapper{
  position:relative;
  width:22px;
  height:22px;
}

.status-dot{
  width:100%;
  height:100%;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%,#66ffcc,var(--green));
  box-shadow:0 0 20px var(--green);
  position:absolute;
}

.ring{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:2px solid var(--green);
  opacity:0;
  animation:ripple 3s infinite;
}

.ring:nth-child(3){animation-delay:1s}

@keyframes ripple{
  0%{transform:scale(1);opacity:.6}
  100%{transform:scale(2.4);opacity:0}
}

.header-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

h1{
  font-size:24px;
  font-weight:800;
}

.button-group{
  display:flex;
  gap:15px;
}

.btn{
  flex:1;
  padding:12px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  color:white;
  text-align:center;
  text-decoration:none;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.btn:hover{
  box-shadow:0 0 20px rgba(255,255,255,.6);
  transform:translateY(-2px);
}

/* Cards */

.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:30px;
  padding:30px;
  margin-bottom:35px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.service-title{
  font-size:22px;
  font-weight:700;
}

.badge{
  padding:8px 20px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
}

.operational{color:var(--green);border:2px solid var(--green);box-shadow:0 0 15px var(--green)}
.maintenance{color:var(--purple);border:2px solid var(--purple);box-shadow:0 0 15px var(--purple)}
.down{color:var(--red);border:2px solid var(--red);box-shadow:0 0 15px var(--red)}
.development{color:var(--blue);border:2px solid var(--blue);box-shadow:0 0 15px var(--blue)}

.progress-wrapper{
  background:rgba(255,255,255,0.08);
  border-radius:30px;
  height:22px;
  overflow:hidden;
}

.progress-bar{
  position:relative;
  height:100%;
  border-radius:30px;
  background:linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8);
  box-shadow:0 0 20px rgba(76,201,255,.7);
  width:0;
  transition:width 1.5s ease;
  overflow:hidden;
}

/* Shine clipped inside */

.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  height:100%;
  width:40%;
  background:linear-gradient(
    120deg,
    transparent 0%,
    rgba(255,255,255,.6) 50%,
    transparent 100%
  );
  transform:skewX(-20deg);
  animation:slideShine 3s ease-in-out infinite;
}

@keyframes slideShine{
  0%{left:-100%}
  100%{left:120%}
}

.percent{
  margin-top:10px;
  font-weight:600;
}

.team-grid{display:grid;gap:12px}

.team-role{
  padding:14px 18px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
}

.footer{
  text-align:center;
  margin-top:50px;
  opacity:.6;
}
</style>
</head>

<body>

<div id="loader">
  <div class="loader-title">Status Loading...</div>
  <div class="loader-bar-wrapper">
    <div class="loader-bar"></div>
  </div>
</div>

<canvas id="particles"></canvas>

<div class="container" id="mainContent">

<div class="header">
  <div class="header-top">
    <div class="status-wrapper">
      <div class="status-dot"></div>
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <h1>Shoot a Brain Rot Status</h1>
  </div>

  <div class="button-group">
    <button class="btn" id="toggleBtn">Toggle Mode</button>
    <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
  </div>
</div>

<div id="services"></div>

<div class="card">
  <div class="row">
    <div class="service-title">Our Team</div>
    <div class="badge development">CORE</div>
  </div>
  <div class="team-grid">
    <div class="team-role"><strong>Owner:</strong> Tazz</div>
    <div class="team-role"><strong>Co Owner:</strong> Jme</div>
    <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
    <div class="team-role"><strong>Administrations:</strong> Joe</div>
    <div class="team-role"><em>More soon...</em></div>
  </div>
</div>

<div class="footer">Made by Tazz & Jme</div>

</div>

<script>

/* Loader reveal */
setTimeout(()=>{
  document.getElementById("loader").style.opacity="0";
  document.getElementById("mainContent").style.opacity="1";
  setTimeout(()=>{document.getElementById("loader").style.display="none"},1000);
},10000);

/* Services */

const services=[
{name:"Discord Bot",percent:100,status:"operational"},
{name:"Website",percent:0,status:"maintenance"},
{name:"Progress",percent:10,status:"development"},
{name:"API",percent:5,status:"down"}
];

function render(){
  const container=document.getElementById("services");
  services.forEach(service=>{
    const card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <div class="row">
        <div class="service-title">${service.name}</div>
        <div class="badge ${service.status}">${service.status.toUpperCase()}</div>
      </div>
      <div class="progress-wrapper">
        <div class="progress-bar"></div>
      </div>
      <div class="percent">0%</div>
    `;
    container.appendChild(card);

    const bar=card.querySelector(".progress-bar");
    const percentText=card.querySelector(".percent");

    setTimeout(()=>{bar.style.width=service.percent+"%"},200);

    let count=0;
    let interval=setInterval(()=>{
      if(count>=service.percent){clearInterval(interval)}
      else{count++;percentText.textContent=count+"%"}
    },15);
  });
}
render();

/* Toggle */

document.getElementById("toggleBtn").onclick=()=>{
  document.body.classList.toggle("light");
};

/* Particles */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<70;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    dx:(Math.random()-.5)*0.4,
    dy:(Math.random()-.5)*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(76,201,255,.7)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.x+=p.dx;
    p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });
  requestAnimationFrame(animate);
}
animate();

</script>
</body>
</html>
