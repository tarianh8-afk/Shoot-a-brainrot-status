<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f1222;
    --bg2:#1b1f3a;
    --glass:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --accent:#a855f7;
}

.light{
    --bg1:#eef1ff;
    --bg2:#f8f9ff;
    --glass:rgba(255,255,255,0.7);
    --border:rgba(0,0,0,0.08);
    --text:#111827;
    --accent:#9333ea;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);
    padding:60px 20px;
    transition:0.3s ease;
}

.container{
    max-width:800px;
    margin:auto;
}

.header{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    padding:30px 40px;
    border-radius:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:60px;
}

h1{
    margin:0;
    font-size:28px;
}

.toggle{
    padding:10px 22px;
    border-radius:50px;
    border:none;
    background:var(--accent);
    color:white;
    font-weight:600;
    cursor:pointer;
}

.card{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    margin-bottom:40px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.progress-bar{
    width:100%;
    height:18px;
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    margin-bottom:15px;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent),#d8b4fe);
    border-radius:20px;
    transition:0.6s ease;
}

.percent{
    font-weight:600;
    margin-bottom:15px;
}

.input-row{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:8px;
    border-radius:10px;
    border:none;
}

button.update{
    padding:8px 16px;
    border-radius:10px;
    border:none;
    background:var(--accent);
    color:white;
    cursor:pointer;
}

.footer{
    text-align:center;
    margin-top:60px;
    opacity:0.6;
}

@media(max-width:600px){
    body{padding:40px 15px}
    .card{padding:25px}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🧠 Shoot a Brain Rot Status</h1>
        <button class="toggle" onclick="toggleMode()">Toggle Mode</button>
    </div>

    <div id="services"></div>

    <div class="footer">
        Made by <strong>tazz</strong> & Co-Owner <strong>Jme</strong>
    </div>

</div>

<script>

let services = JSON.parse(localStorage.getItem("services")) || [
    {name:"Discord Bot", progress:40},
    {name:"Website", progress:20},
    {name:"our progress !! ", progress:10}
];

function render(){
    const container = document.getElementById("services");
    container.innerHTML = "";

    services.forEach((service,index)=>{
        const card = document.createElement("div");
        card.className="card";

        card.innerHTML = `
            <div class="row">
                <h2>${service.name}</h2>
                <span class="percent">${service.progress}%</span>
            </div>

            <div class="progress-bar">
                <div class="fill" style="width:${service.progress}%"></div>
            </div>

            <div class="input-row">
                <input type="number" min="0" max="100" placeholder="Set %" id="input-${index}">
                <button class="update" onclick="updateProgress(${index})">Update</button>
            </div>
        `;

        container.appendChild(card);
    });
}

function updateProgress(index){
    const input = document.getElementById(`input-${index}`);
    let value = parseInt(input.value);

    if(value >= 0 && value <= 100){
        services[index].progress = value;
        localStorage.setItem("services", JSON.stringify(services));
        render();
    }
}

function toggleMode(){
    document.body.classList.toggle("light");
    localStorage.setItem("mode",
        document.body.classList.contains("light")?"light":"dark");
}

if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}

render();

</script>

</body>
</html>
