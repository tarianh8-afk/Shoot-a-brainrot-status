<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0b0d17;
    --card:#121528;
    --text:#ffffff;
    --accent:#a855f7;
}

.light{
    --bg:#f4f6ff;
    --card:#ffffff;
    --text:#111827;
    --accent:#9333ea;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:30px 15px;
    transition:0.3s ease;
}

.container{
    max-width:700px;
    margin:auto;
}

.header{
    background:var(--card);
    padding:25px;
    border-radius:25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    border:2px solid var(--accent);
    box-shadow:0 0 30px rgba(168,85,247,0.4);
}

.toggle{
    background:var(--accent);
    border:none;
    padding:10px 20px;
    border-radius:40px;
    color:white;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 0 20px var(--accent);
}

.card{
    background:var(--card);
    padding:30px;
    border-radius:25px;
    margin-bottom:25px;
    border:2px solid var(--accent);
    box-shadow:0 0 30px rgba(168,85,247,0.25);
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 45px rgba(168,85,247,0.5);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.status{
    padding:8px 20px;
    border-radius:40px;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--accent);
    border:2px solid var(--accent);
    box-shadow:0 0 15px var(--accent);
}

.bars{
    display:flex;
    gap:6px;
    margin-top:25px;
    flex-wrap:wrap;
}

.bar{
    width:8px;
    height:45px;
    border-radius:6px;
    background:transparent;
    border:2px solid var(--accent);
    box-shadow:0 0 12px var(--accent);
    transition:0.3s ease;
}

.bar:hover{
    background:var(--accent);
    transform:scale(1.2);
    box-shadow:0 0 25px var(--accent), 0 0 50px var(--accent);
}

.footer{
    text-align:center;
    margin-top:40px;
    opacity:0.6;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🧠 Shoot a Brain Rot Status</h1>
        <button class="toggle" onclick="toggleMode()">Toggle Mode</button>
    </div>

    <div id="services"></div>

    <div class="footer">
        Made by <strong>tazz</strong> & Co-Owner <strong>Jme</strong>
    </div>

</div>

<script>
const servicesData = [
    {name:"Discord Bot", status:"Maintenance"},
    {name:"Website", status:"Maintenance"},
    {name:"API", status:"Maintenance"}
];

function render(){
    const container = document.getElementById("services");
    container.innerHTML = "";

    servicesData.forEach(service=>{
        const card = document.createElement("div");
        card.className="card";

        let barsHTML = "";
        for(let i=0;i<30;i++){
            barsHTML += `<div class="bar"></div>`;
        }

        card.innerHTML = `
            <div class="row">
                <h2>${service.name}</h2>
                <div class="status">${service.status}</div>
            </div>
            <div class="bars">${barsHTML}</div>
        `;

        container.appendChild(card);
    });
}

function toggleMode(){
    document.body.classList.toggle("light");
    localStorage.setItem("mode",
        document.body.classList.contains("light")?"light":"dark");
}

if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}

render();
</script>

</body>
</html>
