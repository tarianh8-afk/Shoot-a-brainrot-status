<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#0a0f25;
  --bg2:#05060a;
  --glass:rgba(25,30,60,0.45);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --green:#00ff99;
  --purple:#b46cff;
  --red:#ff3b5c;
  --blue:#4cc9ff;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(140deg,var(--bg1),var(--bg2));
  background-size:200% 200%;
  animation:bgShift 15s ease infinite;
  color:var(--text);
  padding:40px 20px;
  overflow-x:hidden;
}

@keyframes bgShift{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{max-width:900px;margin:auto}

/* FLOAT HEADER */
@keyframes floatHeader{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}

.header{
  background:var(--glass);
  backdrop-filter:blur(25px);
  border:1px solid var(--border);
  border-radius:30px;
  padding:30px;
  margin-bottom:50px;
  animation:floatHeader 6s ease-in-out infinite;
  box-shadow:0 0 40px rgba(0,0,0,.6);
}

/* STATUS DOT ULTRA */
.status-wrapper{
  position:relative;
  width:24px;height:24px;
}

@keyframes blob{
  0%,100%{border-radius:50%}
  50%{border-radius:60% 40% 55% 45%}
}

.status-dot{
  width:100%;height:100%;
  background:radial-gradient(circle at 30% 30%,#66ffcc,var(--green));
  animation:blob 6s infinite ease-in-out;
  box-shadow:0 0 25px var(--green),0 0 60px var(--green);
}

.status-dot::before{
  content:"";
  position:absolute;
  width:8px;height:8px;
  top:4px;left:5px;
  background:white;
  border-radius:50%;
  filter:blur(1px);
  animation:shineMove 3s infinite ease-in-out;
}

@keyframes shineMove{
  50%{transform:translate(3px,3px)}
}

.header-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:25px;
}

h1{font-size:26px;font-weight:800}

/* BUTTONS */
.button-group{display:flex;gap:15px}

.btn{
  flex:1;
  text-align:center;
  padding:14px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  color:white;
  font-weight:600;
  transition:.3s;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 25px rgba(255,255,255,.5);
}

/* CARDS */
.card{
  background:var(--glass);
  backdrop-filter:blur(25px);
  border:1px solid var(--border);
  border-radius:30px;
  padding:35px;
  margin-bottom:40px;
  transition:.4s;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.card:hover{
  transform:rotateX(4deg) rotateY(4deg);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.service-title{font-size:22px;font-weight:700}

/* BADGES */
.badge{
  padding:8px 22px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
}

.operational{
  color:var(--green);
  border:2px solid var(--green);
  box-shadow:0 0 20px var(--green);
}

.maintenance{
  color:var(--purple);
  border:2px solid var(--purple);
  box-shadow:
    0 0 20px var(--purple),
    0 0 45px rgba(180,108,255,.7),
    inset 0 0 15px rgba(180,108,255,.4);
}

.down{
  color:var(--red);
  border:2px solid var(--red);
  box-shadow:0 0 20px var(--red);
}

.development{
  color:var(--blue);
  border:2px solid var(--blue);
  box-shadow:0 0 20px var(--blue);
}

/* PROGRESS */
.progress-wrapper{
  background:rgba(255,255,255,0.07);
  border-radius:30px;
  height:24px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  border-radius:30px;
  background:linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8);
  box-shadow:0 0 25px rgba(76,201,255,.8);
  position:relative;
  animation:fillBar 2s ease forwards;
}

@keyframes fillBar{
  from{width:0}
}

.progress-bar::after{
  content:"";
  position:absolute;
  top:0;left:-120%;
  height:100%;width:60%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.6),transparent);
  transform:skewX(-20deg);
  animation:shine 4s infinite;
}

@keyframes shine{
  100%{left:150%}
}

.percent{margin-top:12px;font-weight:600}

/* TEAM */
.team-grid{
  display:grid;
  gap:15px;
}

.team-role{
  padding:16px 20px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  box-shadow:0 0 20px rgba(255,255,255,.05);
}

/* FOOTER */
.footer{
  text-align:center;
  margin-top:60px;
  opacity:.6;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="header-top">
    <div class="status-wrapper">
      <div class="status-dot"></div>
    </div>
    <h1>Shoot a Brain Rot Status</h1>
  </div>

  <div class="button-group">
    <button class="btn">Toggle Mode</button>
    <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
  </div>
</div>

<div id="services"></div>

<div class="card">
  <div class="row">
    <div class="service-title">Our Team</div>
    <div class="badge development">CORE</div>
  </div>

  <div class="team-grid">
    <div class="team-role"><strong>Owner:</strong> Tazz</div>
    <div class="team-role"><strong>Co Owner:</strong> Jme</div>
    <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
    <div class="team-role"><strong>Administrations:</strong> Joe</div>
  </div>
</div>

<div class="footer">Made by Tazz & Jme</div>

</div>

<script>
const services=[
{name:"Discord Bot",percent:100,status:"operational"},
{name:"Website",percent:0,status:"maintenance"},
{name:"Progress",percent:10,status:"development"},
{name:"API",percent:5,status:"down"}
];

function render(){
const container=document.getElementById("services");

services.forEach(service=>{
const card=document.createElement("div");
card.className="card";
card.innerHTML=`
<div class="row">
<div class="service-title">${service.name}</div>
<div class="badge ${service.status}">
${service.status.toUpperCase()}
</div>
</div>
<div class="progress-wrapper">
<div class="progress-bar" style="width:${service.percent}%"></div>
</div>
<div class="percent">${service.percent}%</div>
`;
container.appendChild(card);
});
}

render();
</script>

</body>
</html>
