<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultra God Mode Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --blue1:#4cc9ff;
  --blue2:#3a86ff;
  --blue3:#1d4ed8;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:#05060a;
  color:#fff;
  overflow-x:hidden;
}

/* Animated Gradient Mesh Background */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 20% 30%, rgba(76,201,255,.25), transparent 50%),
             radial-gradient(circle at 80% 70%, rgba(58,134,255,.2), transparent 50%),
             radial-gradient(circle at 50% 50%, rgba(29,78,216,.15), transparent 60%);
  animation:meshMove 15s infinite alternate ease-in-out;
  z-index:-2;
}

@keyframes meshMove{
  0%{transform:translate(0,0) scale(1)}
  100%{transform:translate(-50px,-30px) scale(1.1)}
}

/* Floating Orbs */
.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(60px);
  opacity:.3;
  animation:float 20s infinite alternate ease-in-out;
  z-index:-1;
}

.orb1{width:300px;height:300px;background:var(--blue1);top:10%;left:10%}
.orb2{width:250px;height:250px;background:var(--blue2);bottom:10%;right:15%}

@keyframes float{
  0%{transform:translateY(0)}
  100%{transform:translateY(-60px)}
}

/* Loader */
.loader{
  position:fixed;
  inset:0;
  background:#05060a;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
  animation:fadeOut 2s forwards 2s;
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden}
}

.loader span{
  font-size:22px;
  letter-spacing:4px;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%,100%{opacity:.3}
  50%{opacity:1}
}

/* Layout */
.container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* Glass Card */
.card{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(25px);
  border-radius:30px;
  padding:30px;
  margin-bottom:40px;
  border:1px solid rgba(255,255,255,.1);
  transition:.4s;
  transform-style:preserve-3d;
}

.card:hover{
  box-shadow:0 30px 60px rgba(0,0,0,.6);
}

/* Status */
.status{
  display:flex;
  align-items:center;
  gap:15px;
}

.status-dot{
  width:20px;
  height:20px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #fff, var(--blue1));
  box-shadow:0 0 25px var(--blue1);
  position:relative;
}

.status-dot::after{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  border:2px solid var(--blue1);
  opacity:.6;
  animation:ring 2s infinite;
}

@keyframes ring{
  0%{transform:scale(.8);opacity:.6}
  100%{transform:scale(1.5);opacity:0}
}

/* Progress Bars */
.progress-wrapper{
  background:rgba(255,255,255,.08);
  height:24px;
  border-radius:30px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  border-radius:30px;
  background:linear-gradient(90deg,var(--blue1),var(--blue2),var(--blue3));
  box-shadow:0 0 30px var(--blue1);
  position:relative;
  width:0;
  transition:1.5s;
}

.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  height:100%;
  width:60%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
  transform:skewX(-20deg);
  animation:shine 4s infinite;
}

@keyframes shine{
  0%{left:-120%}
  100%{left:150%}
}

h1{margin-bottom:15px}
h2{margin-bottom:15px}
p{margin-top:10px;opacity:.7}
</style>
</head>
<body>

<div class="loader"><span>LOADING ULTRA MODE</span></div>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">

<div class="card status">
  <div class="status-dot"></div>
  <h1>Shoot a Brain Rot</h1>
</div>

<div id="services"></div>

</div>

<script>
/* Services */
const services=[
{name:"Discord Bot",percent:100},
{name:"Website",percent:0},
{name:"Progress",percent:10},
{name:"API",percent:5}
];

const container=document.getElementById("services");

services.forEach(s=>{
  const card=document.createElement("div");
  card.className="card tilt";
  card.innerHTML=`
    <h2>${s.name}</h2>
    <div class="progress-wrapper">
      <div class="progress-bar" data-width="${s.percent}%"></div>
    </div>
    <p>${s.percent}%</p>
  `;
  container.appendChild(card);
});

setTimeout(()=>{
  document.querySelectorAll(".progress-bar").forEach(bar=>{
    bar.style.width=bar.dataset.width;
  });
},500);

/* 3D Tilt */
document.addEventListener("mousemove",e=>{
  document.querySelectorAll(".tilt").forEach(card=>{
    const rect=card.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;
    const centerX=rect.width/2;
    const centerY=rect.height/2;
    const rotateX=((y-centerY)/25);
    const rotateY=((centerX-x)/25);
    card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateZ(10px)`;
  });
});
</script>

</body>
</html>
