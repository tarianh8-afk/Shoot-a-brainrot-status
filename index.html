<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botify Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#07080f;
    --card:#0f1324;
    --text:#ffffff;
    --muted:#8b8fa3;
    --maintenance:#a855f7;
}

.light{
    --bg:#f5f7ff;
    --card:#ffffff;
    --text:#111827;
    --muted:#6b7280;
    --maintenance:#9333ea;
}

*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:30px 15px;
    transition:0.3s ease;
}

.container{
    max-width:700px;
    margin:auto;
}

.header{
    background:var(--card);
    padding:25px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:15px;
    margin-bottom:30px;
    box-shadow:0 0 40px rgba(168,85,247,0.2);
}

.dot{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--maintenance);
    box-shadow:0 0 15px var(--maintenance);
    animation:pulse 1.8s infinite;
}

h1{
    font-size:26px;
    margin:0;
}

.card{
    background:var(--card);
    padding:25px;
    border-radius:22px;
    margin-bottom:25px;
    transition:0.3s ease;
    border:1px solid rgba(255,255,255,0.04);
    box-shadow:0 0 30px rgba(168,85,247,0.08);
}

.card:hover{
    transform:translateY(-6px);
    box-shadow:0 0 45px rgba(168,85,247,0.25);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.status{
    padding:7px 18px;
    border-radius:50px;
    font-size:12px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--maintenance);
    border:1px solid var(--maintenance);
    box-shadow:0 0 15px rgba(168,85,247,0.5);
}

.bars{
    margin-top:25px;
    display:flex;
    gap:6px;
}

.bar{
    flex:1;
    height:40px;
    border-radius:8px;
    background:var(--maintenance);
    box-shadow:0 0 15px var(--maintenance);
    opacity:0.85;
    transition:0.3s ease;
    animation:wave 2s infinite ease-in-out;
}

.bar:hover{
    transform:scale(1.2);
    box-shadow:0 0 25px var(--maintenance), 0 0 50px var(--maintenance);
}

.bar:nth-child(odd){
    animation-delay:0.2s;
}

.bar:nth-child(even){
    animation-delay:0.4s;
}

.toggle{
    position:fixed;
    top:20px;
    right:20px;
    padding:8px 15px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-weight:600;
    background:var(--maintenance);
    color:white;
    box-shadow:0 0 15px var(--maintenance);
}

.footer{
    text-align:center;
    margin-top:40px;
    color:var(--muted);
    font-size:14px;
}

@keyframes pulse{
    0%{transform:scale(1);opacity:0.7}
    50%{transform:scale(1.2);opacity:1}
    100%{transform:scale(1);opacity:0.7}
}

@keyframes wave{
    0%{transform:scaleY(0.8)}
    50%{transform:scaleY(1.1)}
    100%{transform:scaleY(0.8)}
}

@media(max-width:600px){
    .bar{height:35px}
}
</style>
</head>

<body>

<button class="toggle" onclick="toggleMode()">Toggle Mode</button>

<div class="container">

    <div class="header">
        <div class="dot"></div>
        <h1>Botify Status</h1>
    </div>

    <div class="card">
        <div class="row">
            <h2>Discord Bot</h2>
            <div class="status">Maintenance</div>
        </div>
        <div class="bars">
            ${'<div class="bar"></div>'.repeat(30)}
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>Website</h2>
            <div class="status">Maintenance</div>
        </div>
        <div class="bars">
            ${'<div class="bar"></div>'.repeat(30)}
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>Panel</h2>
            <div class="status">Maintenance</div>
        </div>
        <div class="bars">
            ${'<div class="bar"></div>'.repeat(30)}
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>Database</h2>
            <div class="status">Maintenance</div>
        </div>
        <div class="bars">
            ${'<div class="bar"></div>'.repeat(30)}
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>API</h2>
            <div class="status">Maintenance</div>
        </div>
        <div class="bars">
            ${'<div class="bar"></div>'.repeat(30)}
        </div>
    </div>

    <div class="footer">
        Made by <strong>tazz</strong> & Co-Owner <strong>Jme</strong>
    </div>

</div>

<script>
function toggleMode(){
    document.body.classList.toggle("light");
    localStorage.setItem("mode",
        document.body.classList.contains("light")?"light":"dark"
    );
}

if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}
</script>

</body>
</html>
