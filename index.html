<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --card:#0c1020;
  --border:#1b1f33;
  --text:#ffffff;
  --green:#00ff99;
  --purple:#a855f7;
  --red:#ff3b5c;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:30px 18px;
}

/* CONTAINER */
.container{
  max-width:850px;
  margin:auto;
}

/* HEADER */
.header{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:25px;
  padding:25px;
  margin-bottom:40px;
  box-shadow:0 0 60px rgba(0,0,0,0.8);
}

.header-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

.status-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 15px var(--green);
}

h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

.button-group{
  display:flex;
  gap:15px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:50px;
  border:1px solid var(--border);
  background:#111325;
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 15px white;
}

/* CARD */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:30px;
  padding:30px;
  margin-bottom:35px;
  box-shadow:0 0 50px rgba(0,0,0,0.8);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.service-title{
  font-size:22px;
  font-weight:700;
}

/* BADGES */
.badge{
  padding:8px 20px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
}

.operational{
  color:var(--green);
  border:2px solid var(--green);
  box-shadow:0 0 20px var(--green);
}

.maintenance{
  color:var(--purple);
  border:2px solid var(--purple);
  box-shadow:0 0 20px var(--purple);
}

.development{
  color:var(--red);
  border:2px solid var(--red);
  box-shadow:0 0 20px var(--red);
}

/* PROGRESS BAR */
.progress-wrapper{
  background:white;
  border:3px solid black;
  border-radius:30px;
  height:22px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  background:linear-gradient(90deg,#ffffff,#f1f1f1);
  width:0%;
}

.percent{
  margin-top:10px;
  font-weight:600;
}

/* TEAM */
.team-grid{
  display:grid;
  gap:12px;
}

.team-role{
  padding:14px 18px;
  border-radius:18px;
  background:#111325;
  border:1px solid var(--border);
}

.footer{
  text-align:center;
  margin-top:50px;
  opacity:0.6;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="header-top">
    <div class="status-dot"></div>
    <h1>Shoot a Brain Rot Status</h1>
  </div>

  <div class="button-group">
    <button class="btn" onclick="toggleMode()">Toggle Mode</button>
    <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
  </div>
</div>

<div id="services"></div>

<!-- TEAM -->
<div class="card">
  <div class="row">
    <div class="service-title">Our Team</div>
    <div class="badge maintenance">CORE</div>
  </div>

  <div class="team-grid">
    <div class="team-role"><strong>Owner:</strong> Tazz</div>
    <div class="team-role"><strong>Co Owner:</strong> Jme</div>
    <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
    <div class="team-role"><strong>Administrations:</strong> idk (Joe)</div>
    <div class="team-role"><em>More soon...</em></div>
  </div>
</div>

<div class="footer">
Made by Tazz & Jme
</div>

</div>

<script>
const services = [
  {name:"Discord Bot", percent:100, status:"operational"},
  {name:"Website", percent:0, status:"maintenance"},
  {name:"progress", percent:10, status:"development"}
];

function render(){
  const container = document.getElementById("services");

  services.forEach(service=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="row">
        <div class="service-title">${service.name}</div>
        <div class="badge ${service.status}">
          ${service.status.toUpperCase()}
        </div>
      </div>

      <div class="progress-wrapper">
        <div class="progress-bar" style="width:${service.percent}%"></div>
      </div>

      <div class="percent">${service.percent}%</div>
    `;

    container.appendChild(card);
  });
}

render();
</script>

</body>
</html>
