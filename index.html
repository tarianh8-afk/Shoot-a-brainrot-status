<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f1222;
    --bg2:#1b1f3a;
    --glass:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --accent:#a855f7;
}

.light{
    --bg1:#eef1ff;
    --bg2:#f8f9ff;
    --glass:rgba(255,255,255,0.7);
    --border:rgba(0,0,0,0.08);
    --text:#111827;
    --accent:#9333ea;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);
    padding:60px 20px;
    transition:0.4s ease;
}

.container{
    max-width:850px;
    margin:auto;
}

.header{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    padding:30px 40px;
    border-radius:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
    flex-wrap:wrap;
    gap:15px;
    box-shadow:0 0 40px rgba(168,85,247,0.15);
}

h1{
    font-size:24px;
    margin:0;
    font-weight:700;
    letter-spacing:0.5px;
}

.button-group{
    display:flex;
    gap:15px;
}

.glass-btn{
    padding:12px 26px;
    border-radius:50px;
    border:1px solid var(--border);
    background:var(--glass);
    color:var(--text);
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
    backdrop-filter:blur(20px);
    transition:0.3s ease;
    min-width:130px;
    text-align:center;
}

.glass-btn:hover{
    background:var(--accent);
    color:white;
    box-shadow:0 0 25px var(--accent);
    transform:translateY(-2px);
}

.card{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    margin-bottom:40px;
    box-shadow:0 0 35px rgba(168,85,247,0.1);
    transition:0.3s ease;
}

.card:hover{
    box-shadow:0 0 40px rgba(168,85,247,0.25);
    transform:translateY(-4px);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.status{
    font-size:13px;
    font-weight:600;
    opacity:0.7;
    letter-spacing:0.5px;
}

.progress-wrapper{
    background:rgba(255,255,255,0.08);
    border-radius:20px;
    overflow:hidden;
    height:18px;
}

.progress-bar{
    height:100%;
    background:linear-gradient(90deg,var(--accent),#d8b4fe);
    box-shadow:0 0 20px var(--accent);
}

.percent{
    margin-top:12px;
    font-size:13px;
    opacity:0.8;
}

.team-grid{
    display:grid;
    gap:12px;
    margin-top:15px;
}

.team-role{
    padding:14px 18px;
    border-radius:18px;
    background:rgba(255,255,255,0.05);
    border:1px solid var(--border);
    font-weight:500;
    transition:0.3s ease;
}

.team-role:hover{
    background:var(--accent);
    box-shadow:0 0 20px var(--accent);
    color:white;
}

.footer{
    text-align:center;
    margin-top:70px;
    opacity:0.5;
    font-size:14px;
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🧠 Shoot a Brain Rot Status</h1>

        <div class="button-group">
            <button class="glass-btn" onclick="toggleMode()">Toggle Mode</button>
            <a class="glass-btn" href="mailto:Tarianh8@outlook.com">Email Us</a>
        </div>
    </div>

    <div id="services"></div>

    <!-- TEAM SECTION -->
    <div class="card">
        <div class="row">
            <h2>Our Team</h2>
            <div class="status">PROJECT STAFF</div>
        </div>

        <div class="team-grid">
            <div class="team-role"><strong>Owner:</strong> Tazz</div>
            <div class="team-role"><strong>Co Owner:</strong> Jme</div>
            <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
            <div class="team-role"><strong>Administrations:</strong> idk (Joe)</div>
            <div class="team-role"><em>More soon...</em></div>
        </div>
    </div>

    <div class="footer">
        Made by <strong>Tazz</strong> & Co-Owner <strong>Jme</strong>
    </div>

</div>

<script>
let services = [
    {name:"Discord Bot", progress:100},
    {name:"Website", progress:0},
    {name:"Our progress", progress:5}
];

function render(){
    const container = document.getElementById("services");
    container.innerHTML="";

    services.forEach((service)=>{
        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="row">
                <h2>${service.name}</h2>
                <div class="status">MAINTENANCE PROGRESS</div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar" style="width:${service.progress}%"></div>
            </div>

            <div class="percent">${service.progress}% Complete</div>
        `;

        container.appendChild(card);
    });
}

function toggleMode(){
    document.body.classList.toggle("light");
    localStorage.setItem("mode",
        document.body.classList.contains("light")?"light":"dark");
}

if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}

render();
</script>

</body>
</html>
