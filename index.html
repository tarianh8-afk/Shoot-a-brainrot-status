<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brainrot Status</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #1b1f33, #0c0f1d 70%);
    color: white;
    padding: 40px 20px;
    overflow-x: hidden;
}

.container {
    max-width: 750px;
    margin: auto;
}

h1 {
    text-align: center;
    font-size: 36px;
    margin-bottom: 10px;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(90deg,#b84dff,#00ffcc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: fadeIn 1s ease forwards;
}

.subtitle {
    text-align: center;
    opacity: 0.7;
    margin-bottom: 50px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 30px;
    margin-bottom: 30px;
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    transform: translateY(20px);
    opacity: 0;
    animation: slideUp 0.6s ease forwards;
    transition: 0.3s ease;
}

.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 50px rgba(184,77,255,0.3);
}

.card:nth-child(3) { animation-delay: 0.2s; }
.card:nth-child(4) { animation-delay: 0.4s; }
.card:nth-child(5) { animation-delay: 0.6s; }

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.status {
    padding: 8px 18px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
}

.testing {
    background: rgba(170,0,255,0.15);
    color: #d38bff;
    border: 1px solid #b84dff;
    box-shadow: 0 0 15px #b84dff55;
}

.bars {
    display: flex;
    gap: 8px;
    margin-top: 25px;
}

.bar {
    flex: 1;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(180deg,#b84dff,#7a1fff);
    animation: pulse 2s infinite;
    opacity: 0.85;
}

.email-btn {
    display: block;
    text-align: center;
    margin: 40px auto;
    padding: 14px 25px;
    border-radius: 50px;
    width: 250px;
    font-weight: 700;
    font-size: 14px;
    text-decoration: none;
    color: white;
    background: linear-gradient(90deg,#b84dff,#00ffcc);
    box-shadow: 0 0 20px rgba(184,77,255,0.5);
    transition: 0.3s ease;
}

.email-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(0,255,204,0.6);
}

.footer {
    text-align: center;
    margin-top: 60px;
    font-size: 14px;
    opacity: 0.6;
}

.footer span {
    font-weight: 700;
    color: #b84dff;
}

@keyframes pulse {
    0% { opacity: 0.7; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@media(max-width: 600px){
    h1 { font-size: 26px; }
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Shoot a Brainrot Status</h1>
    <div class="subtitle">All systems currently under testing & maintenance</div>

    <div class="card">
        <div class="row">
            <h2>Discord Bot</h2>
            <div class="status testing">TESTING</div>
        </div>
        <div class="bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>Website</h2>
            <div class="status testing">MAINTENANCE</div>
        </div>
        <div class="bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>API</h2>
            <div class="status testing">TESTING</div>
        </div>
        <div class="bars">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>
    </div>

    <a href="mailto:tarianh8@outlook.com" class="email-btn">
        📧 Email Me
    </a>

    <div class="footer">
        Made by <span>tazz</span> & Co-Owner <span>Jme</span>
    </div>

</div>

</body>
</html>
