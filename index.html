<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --glass:rgba(20,25,45,0.55);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --green:#00ff99;
  --purple:#a855f7;
  --red:#ff3b5c;
  --blue:#4cc9ff;
}

*{box-sizing:border-box}

/* ================= LOADER ================= */

#loader{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  overflow:hidden;
  transition:opacity .8s ease;
}

/* Animated background */
#loader::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,#05060a,#0c1025,#101530,#0c1025,#05060a);
  background-size:300% 300%;
  animation:bgMove 8s ease infinite;
  z-index:-1;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Blue Gradient Floating Shine Text (INSIDE text) */
.loader-title{
  font-size:42px;
  font-weight:800;
  margin-bottom:40px;
  background:linear-gradient(
    90deg,
    #4cc9ff,
    #3a86ff,
    #1d4ed8,
    #3a86ff,
    #4cc9ff
  );
  background-size:200% auto;
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  animation:
    gradientMove 3s linear infinite,
    floatText 4s ease-in-out infinite;
}

@keyframes gradientMove{
  0%{background-position:0% center;}
  100%{background-position:200% center;}
}

@keyframes floatText{
  0%{transform:translateY(0)}
  50%{transform:translateY(-14px)}
  100%{transform:translateY(0)}
}

/* Loader Bar */
.loader-bar-wrapper{
  width:320px;
  height:22px;
  background:rgba(255,255,255,0.1);
  border-radius:50px;
  overflow:hidden;
}

.loader-bar{
  height:100%;
  width:0%;
  border-radius:50px;
  background:linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8,#4cc9ff);
  background-size:200% 100%;
  box-shadow:0 0 25px rgba(76,201,255,.9);
  animation:loadBar 4s linear forwards, moveGradientBar 2s linear infinite;
}

@keyframes loadBar{
  from{width:0%}
  to{width:100%}
}

@keyframes moveGradientBar{
  0%{background-position:0%}
  100%{background-position:200%}
}

/* ================= YOUR ORIGINAL SITE ================= */

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#101530 0%,#05060a 60%);
  color:var(--text);
  padding:30px 18px;
  transition:0.4s ease;
}

body.light{
  background:#f5f7ff;
  color:#111;
}

#particles{
  position:fixed;
  inset:0;
  z-index:-1;
}

.container{
  max-width:850px;
  margin:auto;
}

/* (All your original styles remain unchanged below) */

/* FLOATING HEADER */
@keyframes floatHeader {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

.header{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:25px;
  padding:25px;
  margin-bottom:40px;
  animation: floatHeader 5s ease-in-out infinite;
}

/* STATUS DOT + rest unchanged */
.status-wrapper{ position:relative; width:22px; height:22px; }

@keyframes blob {
  0%,100% { border-radius:50%; }
  25% { border-radius:55% 45% 60% 40%/50% 60% 40% 50%; }
  50% { border-radius:45% 55% 40% 60%/60% 40% 60% 40%; }
  75% { border-radius:60% 40% 55% 45%/45% 55% 45% 55%; }
}

@keyframes pulseGlow{
  0%,100%{ box-shadow:0 0 20px var(--green); }
  50%{ box-shadow:0 0 45px var(--green); }
}

.status-dot{
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 30%, #66ffcc, var(--green));
  position:absolute;
  animation: blob 6s infinite ease-in-out,
             pulseGlow 3s infinite ease-in-out;
}

.ring{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:2px solid var(--green);
  opacity:0;
  animation:ripple 3s infinite;
}

.ring:nth-child(3){ animation-delay:1s }
.ring:nth-child(4){ animation-delay:2s }

@keyframes ripple{
  0%{ transform:scale(1); opacity:0.6; }
  100%{ transform:scale(2.4); opacity:0; }
}

/* (Everything else from your original CSS stays exactly the same) */
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-title">Status Loading...</div>
  <div class="loader-bar-wrapper">
    <div class="loader-bar"></div>
  </div>
</div>

<!-- YOUR ORIGINAL HTML CONTINUES BELOW EXACTLY THE SAME -->
<canvas id="particles"></canvas>
<div class="container">
<!-- your full original content stays here unchanged -->
</div>

<script>

/* Fade Loader After 4 Seconds */
setTimeout(()=>{
  document.getElementById("loader").style.opacity="0";
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },800);
},4000);

</script>

</body>
</html>
