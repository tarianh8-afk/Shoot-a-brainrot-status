<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status System</title>

<style>

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:#05070d;
  color:white;
  overflow-x:hidden;
  transition:.4s ease;
}

body.light{
  background:#f4f7ff;
  color:#111;
}

/* PARTICLES */
#particles{
  position:fixed;
  inset:0;
  z-index:-1;
}

/* CONTAINER */
.container{
  max-width:800px;
  margin:80px auto;
  padding:20px;
  perspective:1200px;
}

/* HEADER */
.header{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  padding:30px;
  border-radius:20px;
  margin-bottom:30px;
  text-align:center;
  animation:floatHeader 4s ease-in-out infinite;
  box-shadow:0 0 40px rgba(0,170,255,.3);
}

@keyframes floatHeader{
  0%,100%{transform:translateY(0px);}
  50%{transform:translateY(-8px);}
}

.clock{
  margin-top:10px;
  font-size:14px;
  opacity:.7;
}

/* BUTTONS */
.btn{
  padding:10px 18px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:rgba(255,255,255,.08);
  color:white;
  backdrop-filter:blur(10px);
  transition:.3s ease;
}

.btn:hover{
  box-shadow:0 0 20px rgba(0,170,255,.6);
}

/* CARD */
.card{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
  transition:.2s ease;
  transform-style:preserve-3d;
  box-shadow:0 10px 40px rgba(0,0,0,.5);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:15px;
}

/* STATUS DOT */
.status-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#00ff88;
  box-shadow:0 0 15px #00ff88;
  display:inline-block;
  margin-right:8px;
}

/* BADGE */
.badge{
  font-size:12px;
  padding:6px 10px;
  border-radius:8px;
  background:rgba(255,255,255,.08);
}

/* PROGRESS */
.progress-wrapper{
  width:100%;
  height:12px;
  background:rgba(255,255,255,.08);
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

.progress-bar{
  height:100%;
  width:0%;
  border-radius:20px;
  background:linear-gradient(90deg,#00c6ff,#0044ff);
  box-shadow:
    0 0 20px rgba(0,140,255,.9),
    0 0 40px rgba(0,80,255,.6);
  position:relative;
  transition:width 1.5s cubic-bezier(.2,.8,.2,1);
}

/* SHINE EFFECT (STAYS INSIDE BAR) */
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-40%;
  width:40%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.6),
    transparent
  );
  animation:shine 3s infinite;
}

@keyframes shine{
  0%{left:-40%;}
  100%{left:120%;}
}

.percent{
  text-align:right;
  margin-top:6px;
  font-size:13px;
  opacity:.8;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="header">
  <h1>System Status</h1>
  <div class="clock" id="clock"></div>
  <br>
  <button class="btn" onclick="toggleMode()">Toggle Mode</button>
</div>

<div id="services"></div>

</div>

<script>

/* SERVICES */
const services=[
{name:"Discord Bot",percent:100,status:"Operational"},
{name:"Website",percent:75,status:"Operational"},
{name:"Development",percent:40,status:"In Progress"},
{name:"API",percent:15,status:"Testing"}
];

/* RENDER */
function render(){
const container=document.getElementById("services");
container.innerHTML="";

services.forEach(service=>{
const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<div class="row">
<div><span class="status-dot"></span>${service.name}</div>
<div class="badge">${service.status}</div>
</div>
<div class="progress-wrapper">
<div class="progress-bar"></div>
</div>
<div class="percent">0%</div>
`;

container.appendChild(card);

const bar=card.querySelector(".progress-bar");
const percentText=card.querySelector(".percent");

setTimeout(()=>{
bar.style.width=service.percent+"%";
},300);

/* COUNTER */
let count=0;
let interval=setInterval(()=>{
if(count>=service.percent){
clearInterval(interval);
}else{
count++;
percentText.textContent=count+"%";
}
},15);

/* 3D TILT */
card.addEventListener("mousemove",e=>{
const rect=card.getBoundingClientRect();
const x=e.clientX-rect.left;
const y=e.clientY-rect.top;
const centerX=rect.width/2;
const centerY=rect.height/2;
const rotateX=-(y-centerY)/18;
const rotateY=(x-centerX)/18;
card.style.transform=`rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
});

card.addEventListener("mouseleave",()=>{
card.style.transform="rotateX(0) rotateY(0)";
});
});
}

/* CLOCK */
function updateClock(){
document.getElementById("clock").textContent=
new Date().toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<60;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2+1,
dx:(Math.random()-.5)*0.4,
dy:(Math.random()-.5)*0.4
});
}

function animateParticles(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(0,170,255,.7)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
ctx.fill();
p.x+=p.dx;
p.y+=p.dy;
if(p.x<0||p.x>canvas.width)p.dx*=-1;
if(p.y<0||p.y>canvas.height)p.dy*=-1;
});
requestAnimationFrame(animateParticles);
}
animateParticles();

window.addEventListener("resize",()=>{
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
});

/* TOGGLE MODE */
function toggleMode(){
document.body.classList.toggle("light");
}

render();

</script>

</body>
</html>
