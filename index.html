<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --glass:rgba(20,25,45,0.55);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --green:#00ff99;
  --purple:#a855f7;
  --red:#ff3b5c;
  --blue:#4cc9ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#101530 0%,#05060a 60%);
  color:var(--text);
  padding:30px 18px;
}

/* CONTAINER */
.container{
  max-width:850px;
  margin:auto;
}

/* FLOAT ANIMATION */
@keyframes floatHeader {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}

@keyframes glowPulse {
  0% { box-shadow: 0 0 30px rgba(168,85,247,0.2); }
  50% { box-shadow: 0 0 60px rgba(168,85,247,0.4); }
  100% { box-shadow: 0 0 30px rgba(168,85,247,0.2); }
}

/* HEADER */
.header{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:25px;
  padding:25px;
  margin-bottom:40px;
  animation: floatHeader 5s ease-in-out infinite,
             glowPulse 6s ease-in-out infinite;
}

.header-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

.status-dot{
  width:14px;
  height:14px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 15px var(--green);
}

h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

.button-group{
  display:flex;
  gap:15px;
}

.btn{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 20px rgba(255,255,255,0.6);
  transform:translateY(-2px);
}

/* CARD */
.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:30px;
  padding:30px;
  margin-bottom:35px;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 40px rgba(76,201,255,0.2);
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.service-title{
  font-size:22px;
  font-weight:700;
}

/* BADGES */
.badge{
  padding:8px 20px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
  letter-spacing:1px;
}

.operational{
  color:var(--green);
  border:2px solid var(--green);
  box-shadow:0 0 15px var(--green);
}

.maintenance{
  color:var(--purple);
  border:2px solid var(--purple);
  box-shadow:0 0 15px var(--purple);
}

.down{
  color:var(--red);
  border:2px solid var(--red);
  box-shadow:0 0 15px var(--red);
}

.development{
  color:var(--blue);
  border:2px solid var(--blue);
  box-shadow:0 0 15px var(--blue);
}

/* PROGRESS WRAPPER */
.progress-wrapper{
  background:rgba(255,255,255,0.08);
  border-radius:30px;
  height:22px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.1);
}

/* GLOWING BLUE BAR */
.progress-bar{
  height:100%;
  width:0%;
  border-radius:30px;
  position:relative;
  overflow:hidden;

  background: linear-gradient(
    90deg,
    #4cc9ff 0%,
    #3a86ff 40%,
    #1d4ed8 100%
  );

  box-shadow:
    0 0 15px rgba(76, 201, 255, 0.6),
    0 0 30px rgba(58, 134, 255, 0.4);

  transition: width 1.2s ease;
}

/* SHINE EFFECT */
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.4) 50%,
    transparent 70%
  );
  animation: shine 3s infinite;
}

@keyframes shine{
  100%{
    left:100%;
  }
}

.percent{
  margin-top:10px;
  font-weight:600;
}

/* TEAM */
.team-grid{
  display:grid;
  gap:12px;
}

.team-role{
  padding:14px 18px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  border:1px solid var(--border);
  transition:0.3s;
}

.team-role:hover{
  box-shadow:0 0 15px var(--blue);
}

.footer{
  text-align:center;
  margin-top:50px;
  opacity:0.6;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="header-top">
    <div class="status-dot"></div>
    <h1>Shoot a Brain Rot Status</h1>
  </div>

  <div class="button-group">
    <button class="btn">Toggle Mode</button>
    <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
  </div>
</div>

<div id="services"></div>

<div class="card">
  <div class="row">
    <div class="service-title">Our Team</div>
    <div class="badge development">CORE</div>
  </div>

  <div class="team-grid">
    <div class="team-role"><strong>Owner:</strong> Tazz</div>
    <div class="team-role"><strong>Co Owner:</strong> Jme</div>
    <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
    <div class="team-role"><strong>Administrations:</strong> Joe</div>
    <div class="team-role"><em>More soon...</em></div>
  </div>
</div>

<div class="footer">
Made by Tazz & Jme
</div>

</div>

<script>
const services = [
  {name:"Discord Bot", percent:100, status:"operational"},
  {name:"Website", percent:0, status:"maintenance"},
  {name:"Progress", percent:10, status:"development"},
  {name:"API", percent:5, status:"down"}
];

function render(){
  const container = document.getElementById("services");

  services.forEach(service=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="row">
        <div class="service-title">${service.name}</div>
        <div class="badge ${service.status}">
          ${service.status.toUpperCase()}
        </div>
      </div>

      <div class="progress-wrapper">
        <div class="progress-bar" style="width:${service.percent}%"></div>
      </div>

      <div class="percent">${service.percent}%</div>
    `;

    container.appendChild(card);
  });
}

render();
</script>

</body>
</html>
