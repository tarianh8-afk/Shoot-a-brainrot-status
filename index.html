<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f1222;
    --bg2:#1b1f3a;
    --glass:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --accent:#a855f7;
}

.light{
    --bg1:#eef1ff;
    --bg2:#f8f9ff;
    --glass:rgba(255,255,255,0.7);
    --border:rgba(0,0,0,0.08);
    --text:#111827;
    --accent:#9333ea;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);
    padding:60px 20px;
    transition:0.3s ease;
}

.container{
    max-width:800px;
    margin:auto;
}

.header{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    padding:30px 40px;
    border-radius:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:60px;
}

h1{
    font-size:28px;
    margin:0;
    font-weight:700;
    letter-spacing:0.5px;
}

.toggle{
    padding:10px 22px;
    border-radius:50px;
    border:none;
    background:var(--accent);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
}

.toggle:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(168,85,247,0.4);
}

.card{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    margin-bottom:40px;
    transition:0.3s ease;
}

.card:hover{
    transform:translateY(-5px);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:35px;
}

h2{
    margin:0;
    font-size:22px;
    font-weight:600;
}

.status{
    padding:8px 22px;
    border-radius:50px;
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    border:1px solid var(--accent);
    color:var(--accent);
}

.bars{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.bar{
    width:10px;
    height:60px;
    border-radius:8px;
    background:linear-gradient(to top,var(--accent),transparent);
    opacity:0.6;
    transition:0.3s ease;
}

.bar:hover{
    opacity:1;
    transform:scaleY(1.15);
}

.footer{
    text-align:center;
    margin-top:60px;
    opacity:0.6;
    font-size:14px;
}

@media(max-width:600px){
    body{padding:40px 15px}
    .header{padding:20px}
    .card{padding:25px}
    .bar{height:45px}
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🧠 Shoot a Brain Rot Status</h1>
        <button class="toggle" onclick="toggleMode()">Toggle Mode</button>
    </div>

    <div id="services"></div>

    <div class="footer">
        Made by <strong>tazz</strong> & Co-Owner <strong>Jme</strong>
    </div>

</div>

<script>
const servicesData = [
    {name:"Discord Bot", status:"Maintenance"},
    {name:"Website", status:"Maintenance"},
    {name:"API", status:"Maintenance"}
];

function render(){
    const container = document.getElementById("services");
    container.innerHTML = "";

    servicesData.forEach(service=>{
        const card = document.createElement("div");
        card.className="card";

        let barsHTML = "";
        for(let i=0;i<25;i++){
            barsHTML += `<div class="bar"></div>`;
        }

        card.innerHTML = `
            <div class="row">
                <h2>${service.name}</h2>
                <div class="status">${service.status}</div>
            </div>
            <div class="bars">${barsHTML}</div>
        `;

        container.appendChild(card);
    });
}

function toggleMode(){
    document.body.classList.toggle("light");
    localStorage.setItem("mode",
        document.body.classList.contains("light")?"light":"dark");
}

if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}

render();
</script>

</body>
</html>
