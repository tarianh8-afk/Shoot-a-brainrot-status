<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --green:#00ff99;
  --blue1:#4cc9ff;
  --blue2:#3a86ff;
  --blue3:#1d4ed8;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,#05060a,#0b1020 60%,#05060a);
  color:#fff;
  padding:30px 18px;
}

/* CONTAINER */
.container{
  max-width:700px;
  margin:auto;
}

/* HEADER CARD */
.header{
  text-align:center;
  padding:25px;
  border-radius:30px;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,.08);
  margin-bottom:45px;
}

/* SMALLER CENTERED TITLE */
.header h1{
  font-size:22px;
  font-weight:700;
  letter-spacing:.5px;
}

/* GREEN STATUS DOT */
.status-dot{
  width:14px;
  height:14px;
  margin:0 auto 12px auto;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, #66ffcc, var(--green));
  box-shadow:0 0 25px var(--green);
  position:relative;
}

.status-dot::after{
  content:"";
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:2px solid var(--green);
  opacity:.6;
  animation:ring 2s infinite;
}

@keyframes ring{
  0%{transform:scale(.8);opacity:.6}
  100%{transform:scale(1.6);opacity:0}
}

/* CARD */
.card{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(25px);
  border-radius:30px;
  padding:25px;
  margin-bottom:35px;
  border:1px solid rgba(255,255,255,.08);
}

/* PROGRESS */
.progress-wrapper{
  background:rgba(255,255,255,.08);
  height:20px;
  border-radius:30px;
  overflow:hidden; /* IMPORTANT - keeps shine inside */
  margin-top:15px;
}

.progress-bar{
  height:100%;
  border-radius:30px;
  background:linear-gradient(90deg,var(--blue1),var(--blue2),var(--blue3));
  box-shadow:0 0 25px var(--blue1);
  position:relative;
  width:0;
  transition:1.4s ease;
  overflow:hidden; /* double protection */
}

/* PERFECT SHINE (STAYS INSIDE BAR) */
.progress-bar::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  height:100%;
  width:40%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.6),
    transparent
  );
  transform:skewX(-20deg);
  animation:shine 3.5s infinite;
}

@keyframes shine{
  0%{left:-100%}
  100%{left:120%}
}

.percent{
  margin-top:10px;
  font-size:14px;
  opacity:.8;
}

/* TEAM */
.team-role{
  padding:14px;
  border-radius:18px;
  background:rgba(255,255,255,.04);
  margin-bottom:12px;
  border:1px solid rgba(255,255,255,.05);
}

.footer{
  text-align:center;
  margin-top:40px;
  opacity:.6;
  font-size:14px;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="status-dot"></div>
  <h1>Shoot a Brain Rot</h1>
</div>

<div id="services"></div>

<div class="card">
  <h2>Our Team</h2>
  <div class="team-role"><strong>Owner:</strong> Tazz</div>
  <div class="team-role"><strong>Co Owner:</strong> Jme</div>
  <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
  <div class="team-role"><strong>Administrations:</strong> Joe</div>
</div>

<div class="footer">
Made by Tazz & Jme
</div>

</div>

<script>
const services=[
{name:"Discord Bot",percent:100},
{name:"Website",percent:0},
{name:"Progress",percent:10},
{name:"API",percent:5}
];

const container=document.getElementById("services");

services.forEach(s=>{
  const card=document.createElement("div");
  card.className="card";
  card.innerHTML=`
    <h2>${s.name}</h2>
    <div class="progress-wrapper">
      <div class="progress-bar" data-width="${s.percent}%"></div>
    </div>
    <div class="percent">${s.percent}%</div>
  `;
  container.appendChild(card);
});

setTimeout(()=>{
  document.querySelectorAll(".progress-bar").forEach(bar=>{
    bar.style.width=bar.dataset.width;
  });
},300);
</script>

</body>
</html>
