<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brainrot Status</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #151826, #0d0f1a 70%);
    color: white;
    padding: 40px 20px;
}

.container {
    max-width: 700px;
    margin: auto;
}

h1 {
    text-align: center;
    font-size: 32px;
    margin-bottom: 50px;
    letter-spacing: 1px;
    animation: fadeIn 1s ease forwards;
}

.card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 18px;
    padding: 25px;
    margin-bottom: 25px;
    box-shadow: 0 0 25px rgba(0,0,0,0.4);
    transform: translateY(20px);
    opacity: 0;
    animation: slideUp 0.6s ease forwards;
}

.card:nth-child(2) { animation-delay: 0.2s; }
.card:nth-child(3) { animation-delay: 0.4s; }
.card:nth-child(4) { animation-delay: 0.6s; }

.row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.status {
    padding: 6px 14px;
    border-radius: 50px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.operational {
    background: rgba(0,255,150,0.1);
    color: #00ff9d;
    border: 1px solid #00ff9d;
    box-shadow: 0 0 10px #00ff9d55;
}

.maintenance {
    background: rgba(170,0,255,0.1);
    color: #b84dff;
    border: 1px solid #b84dff;
    box-shadow: 0 0 10px #b84dff55;
}

.down {
    background: rgba(255,0,80,0.1);
    color: #ff0050;
    border: 1px solid #ff0050;
    box-shadow: 0 0 10px #ff005055;
}

.bars {
    display: flex;
    gap: 6px;
    margin-top: 20px;
}

.bar {
    flex: 1;
    height: 36px;
    border-radius: 8px;
    opacity: 0.9;
    animation: pulse 2s infinite;
}

.green { background: #00ff9d; }
.purple { background: #b84dff; }
.red { background: #ff0050; }

@keyframes pulse {
    0% { opacity: 0.7; }
    50% { opacity: 1; }
    100% { opacity: 0.7; }
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

@keyframes slideUp {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

@media(max-width: 600px){
    h1 { font-size: 24px; }
}
</style>
</head>

<body>

<div class="container">
    <h1>🧠 Shoot a Brainrot Status</h1>

    <div class="card">
        <div class="row">
            <h2>Discord Bot</h2>
            <div class="status operational">OPERATIONAL</div>
        </div>
        <div class="bars">
            <div class="bar green"></div>
            <div class="bar green"></div>
            <div class="bar green"></div>
            <div class="bar green"></div>
            <div class="bar green"></div>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>Website</h2>
            <div class="status maintenance">MAINTENANCE</div>
        </div>
        <div class="bars">
            <div class="bar purple"></div>
            <div class="bar purple"></div>
            <div class="bar purple"></div>
            <div class="bar purple"></div>
            <div class="bar purple"></div>
        </div>
    </div>

    <div class="card">
        <div class="row">
            <h2>API</h2>
            <div class="status down">DOWN</div>
        </div>
        <div class="bars">
            <div class="bar red"></div>
            <div class="bar red"></div>
            <div class="bar red"></div>
            <div class="bar red"></div>
            <div class="bar red"></div>
        </div>
    </div>

</div>

</body>
</html>
