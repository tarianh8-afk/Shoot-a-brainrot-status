<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg1:#0f1222;
    --bg2:#1b1f3a;
    --glass:rgba(255,255,255,0.06);
    --border:rgba(255,255,255,0.12);
    --text:#ffffff;
    --accent:#a855f7;
}

.light{
    --bg1:#eef1ff;
    --bg2:#f8f9ff;
    --glass:rgba(255,255,255,0.7);
    --border:rgba(0,0,0,0.08);
    --text:#111827;
    --accent:#9333ea;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:linear-gradient(160deg,var(--bg1),var(--bg2));
    color:var(--text);
    padding:60px 20px;
    transition:0.3s ease;
}

.container{
    max-width:800px;
    margin:auto;
}

.header{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    padding:30px 40px;
    border-radius:30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:60px;
}

h1{
    font-size:28px;
    margin:0;
    font-weight:700;
}

.toggle{
    padding:10px 22px;
    border-radius:50px;
    border:none;
    background:var(--accent);
    color:white;
    font-weight:600;
    cursor:pointer;
    transition:0.3s ease;
}

.toggle:hover{
    box-shadow:0 0 25px var(--accent), 0 0 50px var(--accent);
    transform:translateY(-2px);
}

.card{
    backdrop-filter:blur(25px);
    background:var(--glass);
    border:1px solid var(--border);
    border-radius:30px;
    padding:40px;
    margin-bottom:40px;
    transition:0.3s ease;
    box-shadow:0 0 20px rgba(168,85,247,0.2);
}

.card:hover{
    transform:translateY(-5px);
    box-shadow:0 0 40px rgba(168,85,247,0.4);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

h2{
    margin:0;
    font-size:22px;
    font-weight:600;
}

.status{
    font-size:14px;
    font-weight:600;
    opacity:0.8;
}

.progress-wrapper{
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    overflow:hidden;
    height:22px;
    margin-top:10px;
    border:1px solid var(--accent);
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,var(--accent),#d8b4fe);
    border-radius:20px;
    box-shadow:0 0 10px var(--accent), 0 0 20px var(--accent);
    transition:width 0.6s ease, box-shadow 1s ease-in-out;
    animation: glowPulse 2s infinite alternate;
}

@keyframes glowPulse{
    0%{box-shadow:0 0 10px var(--accent), 0 0 20px var(--accent);}
    50%{box-shadow:0 0 18px var(--accent), 0 0 35px var(--accent);}
    100%{box-shadow:0 0 10px var(--accent), 0 0 20px var(--accent);}
}

.percent{
    margin-top:10px;
    font-size:13px;
    opacity:0.8;
}

.edit-btn{
    margin-top:20px;
    padding:6px 16px;
    border-radius:20px;
    border:none;
    background:var(--accent);
    color:white;
    font-size:12px;
    cursor:pointer;
    box-shadow:0 0 10px var(--accent);
    transition:0.3s ease;
}

.edit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 25px var(--accent),0 0 40px var(--accent);
}

.footer{
    text-align:center;
    margin-top:60px;
    opacity:0.6;
}

@media(max-width:600px){
    body{padding:40px 15px}
    .progress-wrapper{height:18px}
}
</style>
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🧠 Shoot a Brain Rot Status</h1>
        <button class="toggle" onclick="toggleMode()">Toggle Mode</button>
    </div>

    <div id="services"></div>

    <div class="footer">
        Made by <strong>tazz</strong> & Co-Owner <strong>Jme</strong>
    </div>

</div>

<script>
let services = JSON.parse(localStorage.getItem("progressData")) || [
    {name:"Discord Bot", progress:100},
    {name:"Website", progress:0},
    {name:"our progress ", progress:5}
];

function render(){
    const container = document.getElementById("services");
    container.innerHTML="";

    services.forEach((service,index)=>{
        const card=document.createElement("div");
        card.className="card";

        card.innerHTML=`
            <div class="row">
                <h2>${service.name}</h2>
                <div class="status">Maintenance Progress</div>
            </div>

            <div class="progress-wrapper">
                <div class="progress-bar" style="width:${service.progress}%"></div>
            </div>

            <div class="percent">${service.progress}% Complete</div>

            <button class="edit-btn" onclick="editProgress(${index})">
                Update Progress
            </button>
        `;

        container.appendChild(card);
    });
}

function editProgress(index){
    let newVal = prompt("Enter new progress % (0-100):");
    if(newVal !== null){
        newVal = parseInt(newVal);
        if(newVal >=0 && newVal <=100){
            services[index].progress = newVal;
            localStorage.setItem("progressData", JSON.stringify(services));
            render();
        } else {
            alert("Enter a number between 0 and 100");
        }
    }
}

function toggleMode(){
    document.body.classList.toggle("light");
    localStorage.setItem("mode",
        document.body.classList.contains("light")?"light":"dark");
}

if(localStorage.getItem("mode")==="light"){
    document.body.classList.add("light");
}

render();
</script>

</body>
</html>
