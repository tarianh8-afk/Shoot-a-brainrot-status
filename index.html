<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#05060a;
  --glass:rgba(20,25,45,0.55);
  --border:rgba(255,255,255,0.08);
  --text:#ffffff;
  --green:#00ff99;
  --purple:#a855f7;
  --red:#ff3b5c;
  --blue:#4cc9ff;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#101530 0%,#05060a 60%);
  color:var(--text);
  padding:30px 18px;
}

/* FLOAT HEADER */
@keyframes floatHeader {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
  100% { transform: translateY(0px); }
}

.header{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:25px;
  padding:25px;
  margin-bottom:40px;
  animation: floatHeader 5s ease-in-out infinite;
}

/* ===== ADVANCED STATUS DOT ===== */

.status-wrapper{
  position:relative;
  width:22px;
  height:22px;
}

@keyframes blob {
  0%,100% { border-radius:50%; }
  25% { border-radius:55% 45% 60% 40%/50% 60% 40% 50%; }
  50% { border-radius:45% 55% 40% 60%/60% 40% 60% 40%; }
  75% { border-radius:60% 40% 55% 45%/45% 55% 45% 55%; }
}

@keyframes pulseGlow{
  0%,100%{ box-shadow:0 0 20px var(--green); }
  50%{ box-shadow:0 0 45px var(--green); }
}

.status-dot{
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 30%, #66ffcc, var(--green));
  position:absolute;
  animation: blob 6s infinite ease-in-out,
             pulseGlow 3s infinite ease-in-out;
}

/* Shine reflection */
.status-dot::before{
  content:"";
  position:absolute;
  width:8px;
  height:8px;
  top:3px;
  left:4px;
  background:rgba(255,255,255,0.9);
  border-radius:50%;
  filter:blur(1px);
  animation:shineMove 3s infinite ease-in-out;
}

@keyframes shineMove{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(2px,2px); }
}

/* Ripple Rings */
.ring{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:50%;
  border:2px solid var(--green);
  opacity:0;
  animation:ripple 3s infinite;
}

.ring:nth-child(3){ animation-delay:1s }
.ring:nth-child(4){ animation-delay:2s }

@keyframes ripple{
  0%{ transform:scale(1); opacity:0.6; }
  100%{ transform:scale(2.4); opacity:0; }
}

/* Sparkles */
.sparkle{
  position:absolute;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  animation:sparkleAnim 2s infinite ease-in-out;
}

.sparkle:nth-child(5){ top:-5px; left:60%; animation-delay:.5s }
.sparkle:nth-child(6){ bottom:-5px; right:50%; animation-delay:1s }

@keyframes sparkleAnim{
  0%,100%{ opacity:0; transform:scale(0); }
  50%{ opacity:1; transform:scale(1.4); }
}

/* HEADER LAYOUT */
.header-top{
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:20px;
}

h1{
  margin:0;
  font-size:24px;
  font-weight:800;
}

/* BUTTONS */
.button-group{
  display:flex;
  gap:15px;
}

.btn{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  box-shadow:0 0 20px rgba(255,255,255,0.6);
  transform:translateY(-2px);
}

/* ===== YOUR EXISTING CARD + BARS (unchanged except glow bars) ===== */

.card{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:30px;
  padding:30px;
  margin-bottom:35px;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.service-title{
  font-size:22px;
  font-weight:700;
}

.badge{
  padding:8px 20px;
  border-radius:50px;
  font-size:13px;
  font-weight:700;
}

.operational{ color:var(--green); border:2px solid var(--green); box-shadow:0 0 15px var(--green);}
.maintenance{ color:var(--purple); border:2px solid var(--purple); box-shadow:0 0 15px var(--purple);}
.down{ color:var(--red); border:2px solid var(--red); box-shadow:0 0 15px var(--red);}
.development{ color:var(--blue); border:2px solid var(--blue); box-shadow:0 0 15px var(--blue);}

.progress-wrapper{
  background:rgba(255,255,255,0.08);
  border-radius:30px;
  height:22px;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  border-radius:30px;
  background: linear-gradient(90deg,#4cc9ff,#3a86ff,#1d4ed8);
  box-shadow:0 0 20px rgba(76,201,255,.7);
  transition:width 1.2s ease;
}

.percent{
  margin-top:10px;
  font-weight:600;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
  <div class="header-top">

    <div class="status-wrapper">
      <div class="status-dot"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="sparkle"></div>
      <div class="sparkle"></div>
    </div>

    <h1>Shoot a Brain Rot Status</h1>
  </div>

  <div class="button-group">
    <button class="btn">Toggle Mode</button>
    <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
  </div>
</div>

<div id="services"></div>

</div>

<script>
const services = [
  {name:"Discord Bot", percent:100, status:"operational"},
  {name:"Website", percent:0, status:"maintenance"},
  {name:"Progress", percent:10, status:"development"},
  {name:"API", percent:5, status:"down"}
];

function render(){
  const container = document.getElementById("services");

  services.forEach(service=>{
    const card=document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <div class="row">
        <div class="service-title">${service.name}</div>
        <div class="badge ${service.status}">
          ${service.status.toUpperCase()}
        </div>
      </div>
      <div class="progress-wrapper">
        <div class="progress-bar" style="width:${service.percent}%"></div>
      </div>
      <div class="percent">${service.percent}%</div>
    `;
    container.appendChild(card);
  });
}
render();
</script>

</body>
</html>
