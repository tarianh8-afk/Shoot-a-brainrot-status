<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shoot a Brain Rot Status</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --glass:rgba(20,25,45,0.55);
  --border:rgba(255,255,255,0.08);
  --green:#00ff99;
  --blue1:#4cc9ff;
  --blue2:#1d4ed8;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#101530 0%,#05060a 60%);
  color:white;
  padding:30px 18px;
  overflow-x:hidden;
}

/* PARTICLES */
#particles{
  position:fixed;
  inset:0;
  z-index:-1;
}

.container{
  max-width:850px;
  margin:auto;
}

/* FLOATING HEADER */
@keyframes floatHeader{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px);}
}

.header{
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border);
  border-radius:25px;
  padding:30px;
  margin-bottom:40px;
  animation:floatHeader 5s ease-in-out infinite;
}

/* CENTER HEADER CONTENT */
.header-top{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:15px;
}

h1{
  margin:0;
  font-size:26px;
  font-weight:800;
}

/* STATUS DOT */
.status-wrapper{
  position:relative;
  width:20px;
  height:20px;
}

@keyframes blob{
  0%,100%{border-radius:50%;}
  50%{border-radius:60% 40% 50% 50%/50% 60% 40% 50%;}
}

.status-dot{
  width:100%;
  height:100%;
  background:radial-gradient(circle at 30% 30%, #66ffcc, var(--green));
  animation:blob 6s infinite ease-in-out;
}

/* FLOAT TIMER */
@keyframes floatTimer{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-5px);}
}

.alive-wrapper{
  text-align:center;
  margin-top:18px;
}

.alive-timer{
  font-size:20px;
  font-weight:800;
  position:relative;
  display:inline-block;
  padding:4px 8px;

  background:linear-gradient(
    90deg,
    var(--blue1),
    #3a86ff,
    var(--blue2),
    #3a86ff,
    var(--blue1)
  );
  background-size:200% auto;
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;

  animation:
    floatTimer 4s ease-in-out infinite,
    gradientMove 4s linear infinite;
}

@keyframes gradientMove{
  0%{background-position:0% center;}
  100%{background-position:200% center;}
}

/* WHITE SHINE INSIDE TEXT */
.alive-timer::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255,255,255,0.9) 50%,
    transparent 70%
  );
  transform:translateX(-100%) skewX(-20deg);
  animation:shineSlide 3s ease-in-out infinite;

  /* IMPORTANT: clip shine to text */
  background-clip:text;
  -webkit-background-clip:text;
  color:transparent;
  -webkit-text-fill-color:transparent;
  pointer-events:none;
}

@keyframes shineSlide{
  0%{transform:translateX(-100%) skewX(-20deg);}
  100%{transform:translateX(200%) skewX(-20deg);}
}

/* BUTTONS */
.button-group{
  display:flex;
  justify-content:center;
  gap:15px;
  margin-top:25px;
  flex-wrap:wrap;
}

.btn{
  padding:12px 22px;
  border-radius:50px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05);
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  transform:translateY(-3px);
  box-shadow:0 0 18px rgba(76,201,255,.7);
}

.footer{
  text-align:center;
  margin-top:60px;
  opacity:0.6;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">

<div class="header">

  <div class="header-top">
    <div class="status-wrapper">
      <div class="status-dot"></div>
    </div>
    <h1>Shoot a Brain Rot Status</h1>
  </div>

  <div class="alive-wrapper">
    <div class="alive-timer" id="aliveTimer">
      Alive for: 0d 0h 0m 0s
    </div>
  </div>

  <div class="button-group">
    <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
    <a href="https://discord.gg/gyewQRPzqW" target="_blank" class="btn">Discord</a>
  </div>

</div>

<div class="footer">
Made by Tazz & Jme
</div>

</div>

<script>

/* START DATE = WHEN PAGE LOADS */
const startDate = new Date();

function updateAliveTimer(){
  const now = new Date();
  const diff = now - startDate;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("aliveTimer").textContent =
    `Alive for: ${days}d ${hours}h ${minutes}m ${seconds}s`;
}

setInterval(updateAliveTimer,1000);
updateAliveTimer();

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];
for(let i=0;i<80;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    dx:(Math.random()-.5)*0.4,
    dy:(Math.random()-.5)*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(76,201,255,.7)";
  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
    p.x+=p.dx;
    p.y+=p.dy;
    if(p.x<0||p.x>canvas.width)p.dx*=-1;
    if(p.y<0||p.y>canvas.height)p.dy*=-1;
  });
  requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
