<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#05060a;
    --card:#0b0d18;
    --border:#1b1f33;
    --text:#ffffff;
    --green:#00ff99;
    --purple:#a855f7;
    --red:#ff3b5c;
}

*{box-sizing:border-box}

body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
}

/* HEADER */
.header{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:25px;
    padding:25px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:50px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
}

.title-wrap{
    display:flex;
    align-items:center;
    gap:15px;
}

.status-dot{
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--green);
    box-shadow:0 0 15px var(--green);
}

h1{
    margin:0;
    font-size:26px;
    font-weight:800;
}

.button-group{
    display:flex;
    gap:15px;
}

.btn{
    padding:10px 22px;
    border-radius:50px;
    border:1px solid var(--border);
    background:#0f1222;
    color:white;
    text-decoration:none;
    cursor:pointer;
    font-weight:600;
    transition:0.3s;
}

.btn:hover{
    box-shadow:0 0 15px white;
}

/* CARD */
.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:30px;
    padding:35px;
    margin-bottom:40px;
    box-shadow:0 0 60px rgba(0,0,0,0.8);
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:25px;
}

.service-title{
    font-size:24px;
    font-weight:700;
}

/* STATUS BADGE */
.badge{
    padding:8px 20px;
    border-radius:50px;
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
}

.operational{
    color:var(--green);
    border:2px solid var(--green);
    box-shadow:0 0 15px var(--green);
}

.maintenance{
    color:var(--purple);
    border:2px solid var(--purple);
    box-shadow:0 0 15px var(--purple);
}

.down{
    color:var(--red);
    border:2px solid var(--red);
    box-shadow:0 0 15px var(--red);
}

/* SEGMENTED BAR */
.bar{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
}

.segment{
    width:14px;
    height:40px;
    border-radius:6px;
    background:white;
    border:2px solid black;
}

/* TEAM */
.team-grid{
    display:grid;
    gap:12px;
    margin-top:15px;
}

.team-role{
    padding:14px 18px;
    border-radius:18px;
    background:#111325;
    border:1px solid var(--border);
    transition:0.3s;
}

.team-role:hover{
    box-shadow:0 0 20px var(--purple);
}

.footer{
    text-align:center;
    margin-top:60px;
    opacity:0.5;
}
</style>
</head>
<body>

<div class="container">

<div class="header">
    <div class="title-wrap">
        <div class="status-dot"></div>
        <h1>Shoot a Brain Rot Status</h1>
    </div>

    <div class="button-group">
        <button class="btn">Toggle Mode</button>
        <a href="mailto:Tarianh8@outlook.com" class="btn">Email</a>
    </div>
</div>

<!-- SERVICES -->

<div class="card">
    <div class="row">
        <div class="service-title">Discord Bot</div>
        <div class="badge operational">OPERATIONAL</div>
    </div>
    <div class="bar">
        ${'<div class="segment"></div>'.repeat(30)}
    </div>
</div>

<div class="card">
    <div class="row">
        <div class="service-title">Website</div>
        <div class="badge maintenance">MAINTENANCE</div>
    </div>
    <div class="bar">
        ${'<div class="segment"></div>'.repeat(30)}
    </div>
</div>

<div class="card">
    <div class="row">
        <div class="service-title">API</div>
        <div class="badge down">DOWN</div>
    </div>
    <div class="bar">
        ${'<div class="segment"></div>'.repeat(30)}
    </div>
</div>

<!-- TEAM SECTION -->
<div class="card">
    <div class="row">
        <div class="service-title">Our Team</div>
        <div class="badge maintenance">CORE</div>
    </div>

    <div class="team-grid">
        <div class="team-role"><strong>Owner:</strong> Tazz</div>
        <div class="team-role"><strong>Co Owner:</strong> Jme</div>
        <div class="team-role"><strong>Mods:</strong> Batman, Kyle</div>
        <div class="team-role"><strong>Administrations:</strong> idk (Joe)</div>
        <div class="team-role"><em>More soon...</em></div>
    </div>
</div>

<div class="footer">
Made by Tazz & Jme
</div>

</div>

</body>
</html>
